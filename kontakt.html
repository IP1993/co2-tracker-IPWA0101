<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kontakt – CO₂ Tracker</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">
  <a class="navbar-brand d-flex align-items-center" href="index.html">
    <img src="assets/logo.png" alt="Logo" class="logo me-2">
    CO₂ Tracker
  </a>

  <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
    <span class="navbar-toggler-icon"></span>
  </button>

  <div class="collapse navbar-collapse" id="navbarNav">
    <ul class="navbar-nav ms-auto">
      <li class="nav-item"><a class="nav-link" href="index.html">Startseite</a></li>
      <li class="nav-item"><a class="nav-link" href="daten.html">Daten</a></li>
      <li class="nav-item"><a class="nav-link" href="ueber-uns.html">Über uns</a></li>
      <li class="nav-item"><a class="nav-link active" href="kontakt.html">Kontakt</a></li>
    </ul>

    <button id="themeToggle" class="btn btn-outline-light ms-3">Dark Mode</button>
  </div>
</nav>

<main class="container my-5">
  <h1>Kontakt</h1>
  <p>Sie können uns über das folgende Formular eine Nachricht senden.</p>

  <form class="mt-4" onsubmit="sanitizeForm(event)">
    <div class="mb-3">
      <label for="name" class="form-label">Name</label>
      <input type="text" id="name" class="form-control" required>
    </div>

    <div class="mb-3">
      <label for="email" class="form-label">E‑Mail</label>
      <input type="email" id="email" class="form-control" required>
    </div>

    <div class="mb-3">
      <label for="message" class="form-label">Nachricht</label>
      <textarea id="message" class="form-control" rows="4" required></textarea>
    </div>

    <button type="submit" class="btn btn-primary">Absenden</button>
  </form>

  <p class="mt-3 text-muted">Hinweis: Dieses Formular dient nur Demonstrationszwecken und sendet keine echten Nachrichten.</p>
</main>

<footer class="text-center p-3">
  <a href="impressum.html">Impressum</a> |
  <a href="datenschutz.html">Datenschutz</a>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
function sanitize(value) {
  return value.replace(/[<>]/g, "").trim();
}

function sanitizeForm(event) {
  event.preventDefault();

  const name = sanitize(document.getElementById("name").value);
  const email = sanitize(document.getElementById("email").value);
  const message = sanitize(document.getElementById("message").value);

  alert("Vielen Dank für Ihre Nachricht, " + name + ". (Demo‑Formular)");
}
</script>

<script>
const toggleBtn = document.getElementById("themeToggle");
toggleBtn?.addEventListener("click", () => {
  document.body.classList.toggle("dark-mode");
  toggleBtn.textContent =
    document.body.classList.contains("dark-mode") ? "Light Mode" : "Dark Mode";
});
</script>

</body>
</html>
